server.port=8100
spring.application.name=book-service

#Datasource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost/book_service?createDatabaseIfNotExist=true&serverTimezone=UTC
